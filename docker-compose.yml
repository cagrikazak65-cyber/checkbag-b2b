services:
  postgres:
    image: postgres:16-alpine
    container_name: checkbag-b2b-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: checkbag_b2b
      POSTGRES_USER: checkbag
      POSTGRES_PASSWORD: checkbag_password
    ports:
      - "5432:5432"
    volumes:
      - checkbag_postgres_data:/var/lib/postgresql/data

volumes:
  checkbag_postgres_data:
