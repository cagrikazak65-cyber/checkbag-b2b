services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkbag-b2b-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - checkbag_app_data:/app/data
      - checkbag_uploads:/app/public/uploads

volumes:
  checkbag_app_data:
  checkbag_uploads: