services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkbag-b2b-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/checkbag.db}
    volumes:
      - checkbag_app_data:/app/data
      - checkbag_uploads:/app/public/uploads

volumes:
  checkbag_app_data:
  checkbag_uploads:
